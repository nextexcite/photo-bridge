apiVersion: photo-bridge/v1alpha2

jobs:
  - name: example-archive
    operation: copy
    source:
      driver: filesystem
      path: /data/input
    destination:
      driver: rclone
      remote: archive-remote
      path: photos/account-a
    policy:
      integrity:
        manifest: auto
        verification: auto
        allowEmpty: false
      transfer:
        transfers: 8
        checkers: 8
        bufferSize: 16MiB
        maxBufferMemory: 256MiB
      limits:
        maxDuration: 0s
        maxFiles: 0
        maxBytes: 0
      progressInterval: 5s
      retention:
        mode: automatic
        maxAge: 720h
        minRuns: 5

  # Google Takeout can create one ZIP or a numbered set. This job polls a
  # synthetic Drive remote, waits for a stable set, and copies only that set.
  - name: example-takeout
    operation: copy
    source:
      driver: rclone
      remote: source-drive
      path: Takeout
      selector:
        kind: google-takeout-latest
        settleFor: 2h
    destination:
      driver: filesystem
      path: /data/takeout-archive
    policy:
      integrity:
        manifest: auto
        verification: auto
        allowEmpty: false
      transfer:
        transfers: 4
        checkers: 8
        bufferSize: 16MiB
        maxBufferMemory: 256MiB
      limits:
        maxDuration: 0s
        maxFiles: 0
        maxBytes: 0
      progressInterval: 5s
      retention:
        mode: automatic
        maxAge: 720h
        minRuns: 5
