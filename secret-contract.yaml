apiVersion: secret-contract/v1alpha1
project: photo-bridge
publicRepository: true

inputs:
  - name: PHOTOBRIDGE_RCLONE_CONFIG_FILE
    required: false
    sensitivity: secret
    purpose: Path to a runtime-mounted rclone configuration file.
    delivery:
      local: ignored-file
      ci: absent
      runtime: platform-secret-file
      recovery: private-operations-owned
    validation: presence-and-permissions-only

lanes:
  local:
    owner: operator
    committedValues: false
  ci:
    owner: github-actions
    providerCredentials: false
  runtime:
    owner: private-operations-control-plane
    committedValues: false
  recovery:
    owner: private-operations-control-plane
    committedValues: false
