name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
      - run: scripts/fmt-check.sh

  unit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
      - run: go test -race ./...

  vet:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
      - run: go vet ./...

  integration-local:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
      - name: Install pinned rclone
        run: scripts/install-rclone-ci.sh
      - run: scripts/integration-local.sh

  integration-backends:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      minio:
        image: minio/minio:RELEASE.2025-04-22T22-12-26Z
        ports: [9000:9000]
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl --fail http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s --health-timeout 3s --health-retries 20
      webdav:
        image: crazymax/webdav:2.6.0
        ports: [8080:8080]
        env:
          WEBDAV_AUTH_TYPE: Basic
          WEBDAV_USER: fixture-user
          WEBDAV_PASS: fixture-password
          WEBDAV_SCOPE: /data
          WEBDAV_MODIFY: "true"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: true
      - name: Install pinned rclone
        run: scripts/install-rclone-ci.sh
      - name: Exercise MinIO source and WebDAV destination
        run: scripts/integration-backends.sh

  public-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - run: scripts/public-audit.sh --self-test
      - run: scripts/public-audit.sh --skip-gitleaks
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-gate:
    if: always()
    needs: [fmt, unit, vet, integration-local, integration-backends, public-audit]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Require every public gate
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          test "$(jq -r 'to_entries | map(select(.value.result != "success")) | length' <<<"$NEEDS")" = 0
